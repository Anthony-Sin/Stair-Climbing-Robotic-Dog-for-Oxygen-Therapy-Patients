controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.8
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.06
      movement_time_allowance: 15.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      motion_model: "Omni"
      time_steps: 48
      model_dt: 0.05
      batch_size: 1000
      prune_distance: 1.7
      transform_tolerance: 0.2
      temperature: 0.3
      gamma: 0.015
      vx_max: 1.0
      vx_min: -0.346
      vy_max: 0.56
      wz_max: 2.59
      ax_max: 1.911
      ax_min: -1.911
      ay_max: 1.12
      az_max: 5.6
      vx_std: 0.21
      vy_std: 0.09
      wz_std: 1.05
      visualize: false
      reset_period: 1.0
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      critics:
        [
          "ConstraintCritic",
          "PathFollowCritic",
          "PathAlignCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "TwirlingCritic",
          "VelocityDeadbandCritic"
        ]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 22.0
        threshold_to_consider: 1.4
        offset_from_furthest: 5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        threshold_to_consider: 0.8
        offset_from_furthest: 6
        use_path_orientations: true
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 16.0
        threshold_to_consider: 1.2
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 12.0
        threshold_to_consider: 1.0
      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 0.5
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 20.0
        deadband_velocities: [0.0, 0.0, 0.0]

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      update_frequency: 10.0
      publish_frequency: 5.0
      transform_tolerance: 0.2
      always_send_full_costmap: true
      robot_radius: 0.3
      track_unknown_space: false
      observation_sources: lidar_points
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.1
        z_voxels: 20
        max_obstacle_height: 2.0
        mark_threshold: 0
        footprint_clearing_enabled: true
        observation_sources: lidar_points
        lidar_points:
          topic: /lidar_points_filter
          data_type: PointCloud2
          marking: true
          clearing: true
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          min_obstacle_height: -0.2
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35
        cost_scaling_factor: 3.0

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 50.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    odom_topic: "/odom"
    odom_duration: 0.1
    velocity_timeout: 0.4
    enable_stamped_cmd_vel: false
    min_velocity: [-0.346, -0.56, -2.59]
    max_velocity: [1.0, 0.56, 2.59]
    max_accel: [1.911, 1.12, 5.6]
    max_decel: [-1.911, -1.12, -5.6]
    deadband_velocity: [0.0, 0.0, 0.0]
